    max_init_terrain_level: 5
    num_envs: 8192
  entities:
    robot:
      init_state:
        pos: !!python/tuple
        - 0.0
        - 0.0
        - 0.4
        rot: !!python/tuple
        - 1.0
        - 0.0
        - 0.0
        - 0.0
        lin_vel: !!python/tuple
        - 0.0
        - 0.0
        - 0.0
        ang_vel: !!python/tuple
        - 0.0
        - 0.0
        - 0.0
        joint_pos:
          .*thigh_joint: 0.9
          .*calf_joint: -1.8
          .*R_hip_joint: 0.1
          .*L_hip_joint: -0.1
        joint_vel:
          .*: 0.0
      spec_fn: !!python/name:mjlab.asset_zoo.robots.unitree_go2.go2_constants.get_spec ''
      articulation:
        actuators: !!python/tuple
        - target_names_expr: !!python/tuple
          - .*
          transmission_type: !!python/object/apply:mjlab.actuator.actuator.TransmissionType
          - joint
          armature: 0.01
          frictionloss: 0.0
          stiffness: 20.0
          damping: 1.0
          effort_limit: 23.5
        soft_joint_pos_limit_factor: 0.9
      lights: !!python/tuple []
      cameras: !!python/tuple []
      textures: !!python/tuple []
      materials: !!python/tuple []
      collisions: !!python/tuple
      - geom_names_expr: !!python/tuple
        - .*_collision
        contype: 1
        conaffinity: 0
        condim:
          ^[FR][LR]_foot_collision$: 3
          .*_collision: 1
        priority:
          ^[FR][LR]_foot_collision$: 1
        friction:
          ^[FR][LR]_foot_collision$: !!python/tuple
          - 0.6
        solref: null
        solimp:
          ^[FR][LR]_foot_collision$: !!python/tuple
          - 0.9
          - 0.95
          - 0.023
        disable_other_geoms: true
  sensors: !!python/tuple
  - name: feet_ground_contact
    primary:
      mode: geom
      pattern: !!python/tuple
      - FR_foot_collision
      - FL_foot_collision
      - RR_foot_collision
      - RL_foot_collision
      entity: robot
      exclude: !!python/tuple []
    secondary:
      mode: body
      pattern: terrain
      entity: null
      exclude: !!python/tuple []
    fields: !!python/tuple
    - found
    - force
    reduce: netforce
    num_slots: 1
    secondary_policy: first
    track_air_time: true
    global_frame: false
    history_length: 0
    debug: false
  - name: nonfoot_ground_touch
    primary:
      mode: geom
      pattern: .*_collision\d*$
      entity: robot
      exclude: !!python/tuple
      - FR_foot_collision
      - FL_foot_collision
      - RR_foot_collision
      - RL_foot_collision
    secondary:
      mode: body
      pattern: terrain
      entity: null
      exclude: !!python/tuple []
    fields: !!python/tuple
    - found
    reduce: none
    num_slots: 1
    secondary_policy: first
    track_air_time: false
    global_frame: false
    history_length: 0
    debug: false
  extent: 2.0
  spec_fn: null
